name: Sprint1 Frontend Checks

on:
  pull_request:
    paths:
      - 'labra-frontend/**'
      - '.github/workflows/sprint1-frontend-check.yml'
  push:
    branches: [main]
    paths:
      - 'labra-frontend/**'
      - '.github/workflows/sprint1-frontend-check.yml'

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: labra-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type checks
        run: npm run check

      - name: Frontend smoke and shell tests
        run: npm test
