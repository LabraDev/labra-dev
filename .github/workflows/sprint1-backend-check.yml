name: Sprint1 Backend Checks

on:
  pull_request:
    paths:
      - 'labra-backend/**'
      - '.github/workflows/sprint1-backend-check.yml'
  push:
    branches: [main]
    paths:
      - 'labra-backend/**'
      - '.github/workflows/sprint1-backend-check.yml'

jobs:
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: labra-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: labra-backend/go.mod

      - name: Go Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./...

      - name: Race Tests
        run: go test -race ./...
